<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/envios.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
    <script src="/js/envios.js"></script>
    <title>Envios</title>
</head>
<header> <a href="../index.html"> Inicio </a></header>

<body>
    <div id="Container1">
        <div>
            <h1 id="Titulo">Direccion de Envio</h1>
        </div>
        <div class="Container">
            <form action="/procesar-datos" method="post">
                <label for="Pais">Ubicacion(Pais):</label>
                <input placeholder="ej: Costa Rica" type="text" id="Pais" name="Pais" required>
                <label for="Nombre">Nombre:</label>
                <input placeholder="ej: Juan" type="text" id="Nombre" name="Nombre" required>
                <br>
                <label for="Apellido">Apellido:</label>
                <input placeholder="ej: Guitierrez" type="text" id="Apellido" name="Apellido" required>
                <br>
                <label for="NumTel">Numero de telefono:</label>
                <input placeholder="ej: +506 0000 0000" type="text" id="NumTel" name="NumTel" required>
                <label for="Provincia">Provincia:</label>
                <input placeholder="ej: Heredia" type="text" id="Provincia" name="Provincia" required>
                <br>
                <label for="Canton">Canton:</label>
                <input placeholder="ej: Barva" type="text" id="Canton" name="Canton" required>
                <br>
                <label for="CodPos">Codigo Postal:</label>
                <input placeholder="ej: 40201" type="text" id="CodPos" name="CodPos" required>
                <br>
                <label for="Distrito">Distrito:</label>
                <input placeholder="ej: San Roque" type="text" id="Distrito" name="Distrito" required>
                <input type="submit" value="Confirmar">

            </form>
        </div>
    </div>
    
</body>
<footer></footer>

</html>
